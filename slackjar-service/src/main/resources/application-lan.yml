spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.1.110:3306/slackjar_hub_drone?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234Abc666
  data:
    redis:
      host: 192.168.1.110
      port: 6379
      password: 1234Abc666
      database: 1
      timeout: 3000ms
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 100
          # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
          # 连接池中的最大空闲连接
          max-idle: 10
          # 连接池中的最小空闲连接
          min-idle: 0
  cache:
    type: redis
    redis:
      # 指定redis中的过期时间为3天（毫秒）
      time-to-live: 259200000
      key-prefix: "CACHE:"
      use-key-prefix: true
      cache-null-values: true

socketio:
  host: 127.0.0.1
  port: 9092
